<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mamandyk — Мамандық Симуляторы</title>

<style>
:root{--green:#22c55e;--green-dark:#16a34a;--green-light:#f0fdf4;--green-mid:#dcfce7;--bg:#f1f5f9;--white:#fff;--text:#0f172a;--muted:#64748b;--border:#e2e8f0;--shadow:0 2px 16px rgba(0,0,0,.07);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{background:var(--white);border-bottom:1px solid var(--border);padding:0 5%;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
.logo{font-family:'Geologica',sans-serif;font-size:1.1rem;font-weight:900;color:var(--green);display:flex;align-items:center;gap:8px;text-decoration:none;}
.logo-dot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.5);opacity:.6}}
nav{display:flex;gap:4px;}
nav a{color:var(--muted);text-decoration:none;font-weight:600;font-size:.85rem;padding:7px 13px;border-radius:9px;transition:all .2s;}
nav a:hover,nav a.active{background:var(--green-light);color:var(--green-dark);}
.btn{padding:8px 18px;border-radius:10px;font-weight:700;font-family:'Inter',sans-serif;font-size:.82rem;cursor:pointer;transition:all .2s;border:none;display:inline-flex;align-items:center;gap:6px;}
.btn-green{background:var(--green);color:#fff;box-shadow:0 3px 10px rgba(34,197,94,.3);}
.btn-green:hover{background:var(--green-dark);}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--muted);}
.btn-ghost:hover{border-color:var(--green);color:var(--green);}
main{max-width:860px;margin:0 auto;padding:40px 24px 80px;}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.hero{text-align:center;margin-bottom:36px;animation:up .4s ease;}
.badge{display:inline-flex;align-items:center;gap:6px;background:var(--green-mid);border:1px solid #bbf7d0;border-radius:50px;padding:5px 14px;font-size:.72rem;font-weight:800;color:var(--green-dark);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;}
h1{font-family:'Geologica',sans-serif;font-size:clamp(1.5rem,3vw,2rem);font-weight:900;margin-bottom:10px;letter-spacing:-1px;}
h1 em{font-style:normal;color:var(--green);}
.subtitle{color:var(--muted);font-size:.88rem;max-width:460px;margin:0 auto;line-height:1.65;}
/* NO TEST */
.no-test{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:48px 32px;text-align:center;box-shadow:var(--shadow);}
.no-test-icon{font-size:3rem;margin-bottom:16px;}
.no-test h2{font-family:'Geologica',sans-serif;font-size:1.1rem;font-weight:900;margin-bottom:8px;}
.no-test p{color:var(--muted);font-size:.88rem;margin-bottom:24px;line-height:1.6;}
/* CAREER GRID */
.select-label{font-family:'Geologica',sans-serif;font-size:.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px;}
.career-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;margin-bottom:32px;}
.career-card{background:var(--white);border:2px solid var(--border);border-radius:18px;padding:22px 18px;cursor:pointer;transition:all .25s;animation:up .4s ease both;position:relative;}
.career-card:hover{border-color:var(--green);transform:translateY(-3px);box-shadow:0 12px 32px rgba(34,197,94,.15);}
.career-rank{position:absolute;top:12px;right:12px;background:var(--green);color:white;font-family:'Geologica',sans-serif;font-weight:900;font-size:.62rem;padding:3px 8px;border-radius:50px;}
.career-score-num{font-family:'Geologica',sans-serif;font-size:2.2rem;font-weight:900;color:var(--green-dark);line-height:1;}
.career-name{font-family:'Geologica',sans-serif;font-size:.88rem;font-weight:700;margin:6px 0 4px;}
.career-bar{height:4px;background:var(--border);border-radius:10px;overflow:hidden;margin-top:10px;}
.career-bar-fill{height:100%;background:linear-gradient(90deg,var(--green),#86efac);border-radius:10px;transition:width 1s .3s;}
.career-verdict{font-size:.72rem;color:var(--muted);margin-top:8px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
/* LOADING */
.loading-state{display:flex;flex-direction:column;align-items:center;padding:80px 20px;gap:16px;background:var(--white);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow);}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:'Geologica',sans-serif;font-size:.95rem;font-weight:700;color:var(--text);}
.loading-sub{font-size:.78rem;color:var(--muted);}
/* SIMULATOR */
.sim-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.sim-title{font-family:'Geologica',sans-serif;font-size:1rem;font-weight:900;}
.progress-wrap{margin-bottom:20px;}
.progress-label{display:flex;justify-content:space-between;font-size:.75rem;font-weight:700;color:var(--muted);margin-bottom:6px;}
.progress-bar{height:7px;background:var(--border);border-radius:10px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green),#86efac);border-radius:10px;transition:width .6s ease;}
/* TASK */
.task-card{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:32px;box-shadow:var(--shadow);animation:up .3s ease;}
.task-meta{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.task-num-badge{background:var(--green);color:white;font-family:'Geologica',sans-serif;font-size:.68rem;font-weight:900;padding:4px 11px;border-radius:50px;}
.task-type-badge{background:var(--bg);color:var(--muted);font-size:.68rem;font-weight:800;padding:4px 11px;border-radius:50px;border:1px solid var(--border);}
.task-q{font-family:'Geologica',sans-serif;font-size:1rem;font-weight:700;margin-bottom:14px;line-height:1.55;}
.task-hint{background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:12px 16px;font-size:.79rem;color:#92400e;line-height:1.6;margin-bottom:18px;display:flex;gap:10px;}
.options{display:flex;flex-direction:column;gap:10px;}
.option{padding:13px 18px;border:2px solid var(--border);border-radius:12px;cursor:pointer;font-size:.87rem;font-weight:600;transition:all .2s;background:var(--bg);display:flex;align-items:center;gap:12px;}
.option:hover:not(.locked){border-color:var(--green);background:var(--green-light);}
.option.correct{border-color:var(--green);background:var(--green-light);color:var(--green-dark);}
.option.wrong{border-color:#ef4444;background:#fef2f2;color:#dc2626;}
.option.locked{cursor:default;}
.opt-letter{width:26px;height:26px;border-radius:7px;background:var(--border);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.72rem;flex-shrink:0;transition:all .2s;}
.option.correct .opt-letter{background:var(--green);color:white;}
.option.wrong .opt-letter{background:#ef4444;color:white;}
.task-textarea{width:100%;padding:13px;border:2px solid var(--border);border-radius:12px;font-family:'Inter',sans-serif;font-size:.9rem;min-height:110px;outline:none;resize:none;transition:all .2s;line-height:1.6;}
.task-textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(34,197,94,.1);}
.explain-box{margin-top:14px;padding:13px 16px;background:var(--green-light);border:1px solid #bbf7d0;border-radius:12px;font-size:.82rem;line-height:1.65;color:var(--green-dark);}
.next-btn{width:100%;padding:14px;background:var(--green);color:white;border:none;border-radius:12px;font-family:'Geologica',sans-serif;font-size:.95rem;font-weight:900;cursor:pointer;margin-top:14px;transition:all .2s;box-shadow:0 4px 14px rgba(34,197,94,.3);}
.next-btn:hover{background:var(--green-dark);}
/* RESULT */
.result-card{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:40px;text-align:center;box-shadow:var(--shadow);animation:up .4s ease;}
.result-emoji{font-size:3.5rem;margin-bottom:14px;}
.result-score{font-family:'Geologica',sans-serif;font-size:3rem;font-weight:900;color:var(--green-dark);}
.result-label{font-size:.82rem;color:var(--muted);margin-bottom:16px;}
.result-verdict{background:var(--green-light);border:1px solid #bbf7d0;border-radius:14px;padding:16px;font-size:.88rem;font-weight:600;color:var(--green-dark);margin-bottom:24px;line-height:1.6;}
.result-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
@media(max-width:600px){nav{display:none;}.career-grid{grid-template-columns:1fr 1fr;}}

    /* ── Shared Header ── */
    #app-header {
      position: sticky; top: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 5%; height: 64px;
      background: rgba(255,255,255,.97);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      box-shadow: 0 1px 8px rgba(0,0,0,.05);
      gap: 16px;
    }
    .h-logo {
      font-family: 'Geologica', sans-serif;
      font-size: 1.15rem; font-weight: 900;
      color: var(--green); text-decoration: none;
      display: flex; align-items: center; gap: 8px; white-space: nowrap;
    }
    .h-logo-dot {
      width: 8px; height: 8px; background: var(--green);
      border-radius: 50%; animation: hpulse 2s infinite; flex-shrink: 0;
    }
    @keyframes hpulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.5);opacity:.6} }
    .h-nav { display: flex; gap: 2px; }
    .h-nav a {
      color: var(--text-muted, #64748b); text-decoration: none;
      font-weight: 600; font-size: .85rem;
      padding: 7px 12px; border-radius: 9px; transition: all .2s; white-space: nowrap;
    }
    .h-nav a:hover, .h-nav a.active {
      background: var(--green-light, #f0fdf4); color: var(--green-dark, #16a34a);
    }
    .h-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .h-btn {
      padding: 7px 16px; border-radius: 10px; font-weight: 700;
      font-family: 'Inter', sans-serif; font-size: .82rem;
      cursor: pointer; transition: all .2s; border: none;
      display: inline-flex; align-items: center; gap: 6px; text-decoration: none;
    }
    .h-btn-ghost {
      background: transparent; border: 1.5px solid var(--border, #e2e8f0);
      color: var(--text-muted, #64748b);
    }
    .h-btn-ghost:hover { border-color: var(--green); color: var(--green); background: var(--green-light); }
    .h-btn-green { background: var(--green); color: #fff; box-shadow: 0 3px 10px rgba(34,197,94,.3); }
    .h-btn-green:hover { background: var(--green-dark); }
    .h-avatar {
      width: 28px; height: 28px; background: var(--green-mid, #dcfce7);
      color: var(--green-dark, #16a34a); border-radius: 7px;
      display: inline-flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: .68rem;
    }
    @media (max-width: 768px) { .h-nav { display: none; } #app-header { padding: 0 16px; } }

    </style>
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@400;700;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script>
const APP_CONFIG = {
  API_BASE: (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
    ? 'http://localhost:5000' : ''
};
</script>
</head>
<body>
<header id="app-header">
  <a href="index.html" class="h-logo"><span class="h-logo-dot"></span>Mamandyk</a>
  <nav class="h-nav">
    <a href="about.html">Тест туралы</a>
    <a href="careers.html">Мамандықтар</a>
    <a href="simulator.html">Симулятор</a>
    <a href="help.html">Көмек</a>
  </nav>
  <div class="h-right" id="h-auth">
    <a href="login.html" class="h-btn h-btn-ghost">Кіру</a>
    <a href="register.html" class="h-btn h-btn-green">Тіркелу</a>
  </div>
</header>

<main>
  <div class="hero">
    <div class="badge">🎮 Симулятор</div>
    <h1>Мамандықты <em>байқап көр</em></h1>
    <p class="subtitle">Тест нәтижелерің бойынша сенің мамандықтарыңда AI жасаған шынайы тапсырмаларды орында</p>
  </div>
  <div id="main-content"></div>
</main>

<script>

// ── Shared header init ─────────────────────────────
(async function() {
  })();

const API = window.APP_CONFIG ? APP_CONFIG.API_BASE : 'http://localhost:5000';
const _token = localStorage.getItem('mamandyk_token') || localStorage.getItem('token');
let lastCareers = JSON.parse(localStorage.getItem('lastCareers') || '[]');

let currentCareer = null;
let tasks = [];
let currentTask = 0;
let score = 0;
let answered = false;

// ── INIT ─────────────────────────────────────────────
async function init() {
  // localStorage-да жоқ болса API-дан ал
  if (!lastCareers.length && _token) {
    try {
      const res = await fetch(API + '/api/results/my', {
        headers: { 'Authorization': 'Bearer ' + _token }
      });
      const data = await res.json();
      // data массив — ең соңғы нәтижені ал
      if (Array.isArray(data) && data.length) {
        const latest = data[0]; // DESC order — бірінші = ең жаңа
        if (latest.careers && latest.careers.length) {
          lastCareers = latest.careers;
          localStorage.setItem('lastCareers', JSON.stringify(lastCareers));
        }
      }
    } catch(e) { console.error('results fetch:', e); }
  }

  if (!lastCareers.length) {
    document.getElementById('main-content').innerHTML = `
      <div class="no-test">
        <div class="no-test-icon">📋</div>
        <h2>Алдымен тест тапсыр</h2>
        <p>Симулятор сенің тест нәтижелеріндегі мамандықтарды қолданады.<br>Тесттен өткен соң мамандықтарың осы бетте пайда болады.</p>
        <button class="btn btn-green" style="margin:0 auto" onclick="location.href='index.html'">🚀 Тестке өту</button>
      </div>`;
    return;
  }
  showCareerSelect();
}

function showCareerSelect() {
  var _bb = document.getElementById('back-btn'); if(_bb) _bb.style.display='none';
  var _sb = document.getElementById('score-badge'); if(_sb) _sb.style.display='none';

  const cards = lastCareers.map((c, i) => `
    <div class="career-card" data-title="${c.title.replace(/"/g,'&quot;')}" data-score="${c.score}" onclick="startSim(this.dataset.title, parseFloat(this.dataset.score))" style="animation-delay:${i*0.07}s">
      <div class="career-rank">#${i+1}</div>
      <div class="career-score-num">${c.score}%</div>
      <div class="career-name">${c.title}</div>
      <div class="career-bar"><div class="career-bar-fill" style="width:${c.score}%"></div></div>
      <div class="career-verdict">${c.verdict || ''}</div>
    </div>`).join('');

  document.getElementById('main-content').innerHTML = `
    <div class="select-label">Тест нәтижелерің — мамандық таңда 👇</div>
    <div class="career-grid">${cards}</div>`;
}

// ── START SIM ─────────────────────────────────────────
async function startSim(careerTitle, careerScore) {
  currentCareer = careerTitle;
  currentTask   = 0;
  score         = 0;
  answered      = false;

  (function(){var _el_back_btn=document.getElementById('back-btn');if(_el_back_btn){_el_back_btn.style.display   = 'flex'}})();
  (function(){var _el_score_badge=document.getElementById('score-badge');if(_el_score_badge){_el_score_badge.style.display = 'inline-flex'}})();
  (function(){var _el_score_badge=document.getElementById('score-badge');if(_el_score_badge){_el_score_badge.textContent   = `0 / 5`}})();

  document.getElementById('main-content').innerHTML = `
    <div class="loading-state">
      <div class="spinner"></div>
      <div class="loading-text">AI тапсырмалар жасауда...</div>
      <div class="loading-sub">"${careerTitle}" үшін 5 тапсырма дайындалуда</div>
    </div>`;

  try {
    const res  = await fetch(API + '/api/simulator/tasks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ career: careerTitle })
    });
    const data = await res.json();
    tasks = data.tasks || [];
    if (!tasks.length) throw new Error('tasks empty');
    renderSim();
  } catch(e) {
    document.getElementById('main-content').innerHTML = `
      <div class="no-test">
        <div class="no-test-icon">❌</div>
        <h2>AI жауап бермеді</h2>
        <p>Backend іске қосылған ба? Немесе Groq API кілті дұрыс па?</p>
        <button class="btn btn-ghost" onclick="goBack()">← Артқа</button>
      </div>`;
  }
}

function goBack() {
  currentCareer = null; tasks = []; currentTask = 0; score = 0;
  showCareerSelect();
}

// ── RENDER SIM SHELL ──────────────────────────────────
function renderSim() {
  document.getElementById('main-content').innerHTML = `
    <div>
      <div class="sim-header">
        <div class="sim-title">🎯 ${currentCareer} симуляторы</div>
      </div>
      <div class="progress-wrap">
        <div class="progress-label"><span id="prog-label">1 / ${tasks.length} тапсырма</span><span id="prog-pct">0%</span></div>
        <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
      </div>
      <div id="task-area"></div>
    </div>`;
  renderTask();
}

// ── RENDER TASK ───────────────────────────────────────
function renderTask() {
  const task  = tasks[currentTask];
  const total = tasks.length;
  answered    = false;

  const pct = Math.round((currentTask / total) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = `${currentTask + 1} / ${total} тапсырма`;
  document.getElementById('prog-pct').textContent   = pct + '%';
  (function(){var _el_score_badge=document.getElementById('score-badge');if(_el_score_badge){_el_score_badge.textContent = `${score} / ${total}`}})();

  const letters = ['A','B','C','D'];
  let body = '';

  if (task.type === 'choice') {
    body = `<div class="options">` +
      (task.options || []).map((o, i) =>
        `<div class="option" id="opt-${i}" onclick="checkAnswer(${i})">
           <div class="opt-letter">${letters[i]}</div>${o}
         </div>`
      ).join('') + `</div>`;
  } else {
    body = `
      <textarea class="task-textarea" id="text-ans" placeholder="Жауабыңды кем дегенде 20 таңбамен жаз..."></textarea>
      <button class="btn btn-green" id="submit-text-btn" style="width:100%;margin-top:10px;padding:13px;font-size:.9rem" onclick="submitText()">Жіберу →</button>`;
  }

  document.getElementById('task-area').innerHTML = `
    <div class="task-card">
      <div class="task-meta">
        <div class="task-num-badge">Тапсырма ${currentTask + 1}</div>
        <div class="task-type-badge">${task.type === 'choice' ? '🔘 Таңдамалы' : '✍️ Ашық'}</div>
      </div>
      <div class="task-q">${task.question}</div>
      <div class="task-hint">💡 ${task.hint}</div>
      ${body}
    </div>`;
}

function checkAnswer(idx) {
  if (answered) return;
  answered = true;
  const task = tasks[currentTask];
  document.querySelectorAll('.option').forEach(o => o.classList.add('locked'));
  document.querySelector(`#opt-${task.correct}`).classList.add('correct');
  if (idx === task.correct) {
    score++;
  } else {
    document.querySelector(`#opt-${idx}`).classList.add('wrong');
  }
  appendExplainNext(task.explain);
}

function submitText() {
  const val = document.getElementById('text-ans')?.value?.trim();
  if (!val || val.length < 20) { alert('Толығырақ жауап жазыңыз (кем дегенде 20 таңба)'); return; }
  if (answered) return;
  answered = true;
  score += 0.5;
  document.getElementById('text-ans').disabled = true;
  document.getElementById('submit-text-btn').style.display = 'none';
  appendExplainNext('✅ Жауабыңыз қабылданды! ' + (tasks[currentTask].explain || ''));
}

function appendExplainNext(explain) {
  const card = document.querySelector('.task-card');
  const isLast = currentTask + 1 >= tasks.length;
  card.insertAdjacentHTML('beforeend', `
    <div class="explain-box">💡 <strong>Түсіндірме:</strong> ${explain}</div>
    <button class="next-btn" onclick="nextTask()">${isLast ? '🏆 Нәтижені көру' : 'Келесі тапсырма →'}</button>`);
}

function nextTask() {
  currentTask++;
  if (currentTask >= tasks.length) showResult();
  else renderTask();
}

function showResult() {
  const total = tasks.length;
  const pct   = Math.round((score / total) * 100);
  document.getElementById('prog-fill').style.width = '100%';
  document.getElementById('prog-label').textContent = `${total} / ${total} тапсырма`;
  document.getElementById('prog-pct').textContent   = '100%';
  (function(){var _el_score_badge=document.getElementById('score-badge');if(_el_score_badge){_el_score_badge.textContent = `${score} / ${total}`}})();

  let emoji, verdict;
  if (pct >= 80)      { emoji='🌟'; verdict=`${currentCareer} мамандығына табиғи бейімділігің бар! Осы бағытта жалғастыр.`; }
  else if (pct >= 50) { emoji='📈'; verdict=`Негіздерді меңгергенсің — тереңірек оқысаң ${currentCareer} болуың мүмкін!`; }
  else                { emoji='💪'; verdict=`Бұл сала сенің үшін жаңа, бірақ оқу арқылы кез келген мамандықты меңгеруге болады.`; }

  document.getElementById('task-area').innerHTML = `
    <div class="result-card">
      <div class="result-emoji">${emoji}</div>
      <div class="result-score">${pct}%</div>
      <div class="result-label">${total} тапсырмадан ${score} дұрыс</div>
      <div class="result-verdict">${verdict}</div>
      <div class="result-btns">
        <button class="btn btn-green" id="retry-btn" onclick="startSim(currentCareer, 0)">🔄 Қайта</button>
        <button class="btn btn-ghost" onclick="goBack()">← Басқа мамандық</button>
        <button class="btn btn-ghost" onclick="location.href='advisor.html'">🤖 AI кеңес</button>
      </div>
    </div>`;
}

document.addEventListener("DOMContentLoaded", init);
</script>

<script>
(function() {
  document.querySelectorAll('.h-nav a').forEach(a=>{if(a.getAttribute('href')==='simulator.html')a.classList.add('active')});
  
        try {
          const u = JSON.parse(localStorage.getItem('mamandyk_user') || localStorage.getItem('user') || 'null');
          const t = localStorage.getItem('mamandyk_token') || localStorage.getItem('token');
          const area = document.getElementById('h-auth');
          if (t && u) {
            const ini = ((u.first_name||'')[0]||'') + ((u.last_name||'')[0]||'');
            const dash = u.role==='admin'?'admin.html':u.role==='manager'?'manager.html':'profile.html';
            area.innerHTML = `<button class="h-btn h-btn-ghost" onclick="location.href='${dash}'" style="gap:6px">
              <span class="h-avatar">${ini.toUpperCase()}</span><span>${u.first_name}</span></button>
              <button class="h-btn h-btn-ghost" style="font-size:.78rem;padding:5px 12px" onclick="localStorage.clear();location.href='login.html'">Шығу</button>`;
          } else {
            area.innerHTML = '<a href="login.html" class="h-btn h-btn-ghost">Кіру</a><a href="register.html" class="h-btn h-btn-green">Тіркелу</a>';
          }
        } catch(e) {
          document.getElementById('h-auth').innerHTML = '<a href="login.html" class="h-btn h-btn-ghost">Кіру</a><a href="register.html" class="h-btn h-btn-green">Тіркелу</a>';
        }
})();
</script>
